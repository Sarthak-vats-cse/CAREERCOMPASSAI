<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Assessment — Career Compass AI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-slot"></div>

    <main>
      <section class="assessment-page">
        <div class="container">
          <div class="card assessment-form-card">
            <h1>Career Assessment</h1>
            <p class="subtitle">Tell us about your skills and background. Our AI will analyze your profile and recommend the best tech career paths for you.</p>

            <form id="assessmentForm">
              <!-- Skills -->
              <div class="form-group">
                <label class="form-label">Your Skills</label>
                <p class="form-hint">Click to select all skills you currently have or are learning</p>
                <div id="skillsContainer"></div>
              </div>

              <!-- CGPA & Numbers -->
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="cgpa">CGPA (out of 10)</label>
                  <input type="number" id="cgpa" class="form-input" min="0" max="10" step="0.01" placeholder="e.g. 8.5" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="projects">Number of Projects</label>
                  <input type="number" id="projects" class="form-input" min="0" max="50" placeholder="e.g. 3" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="certifications">Number of Certifications</label>
                  <input type="number" id="certifications" class="form-input" min="0" max="30" placeholder="e.g. 2" required>
                </div>
              </div>

              <!-- Career Interests -->
              <div class="form-group">
                <label class="form-label">Career Interests</label>
                <p class="form-hint">Select careers you're interested in exploring (choose at least one)</p>
                <div class="interest-chips" id="interestsContainer"></div>
              </div>

              <div class="form-actions">
                <a href="index.html" class="btn btn-secondary">Cancel</a>
                <button type="submit" id="submitBtn" class="btn btn-primary">Analyze My Profile →</button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-slot"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/assessment.js"></script>
</body>
</html>
